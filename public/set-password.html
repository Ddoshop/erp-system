<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Установка пароля | ТехноТрейд ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Roboto", sans-serif;
      background: #0f1419;
      color: #e3e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1f26;
      border: 1px solid #2d3139;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo span {
      font-size: 26px;
      font-weight: 700;
      color: #3b82f6;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      color: #a0aec0;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .user-info {
      background: #242a33;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .user-info .label { color: #a0aec0; font-size: 12px; margin-bottom: 4px; }
    .user-info .value { color: #e3e8f0; font-weight: 500; }
    label {
      display: block;
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input[type="password"] {
      width: 100%;
      background: #242a33;
      border: 1px solid #2d3139;
      color: #e3e8f0;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    .hint { font-size: 12px; color: #a0aec0; margin-top: 4px; }
    .btn-submit {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-submit:hover { background: #2563eb; }
    .btn-submit:disabled { background: #374151; cursor: not-allowed; }
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-error { background: rgba(239,68,68,.15); border: 1px solid #ef4444; color: #ef4444; }
    .alert-success { background: rgba(16,185,129,.15); border: 1px solid #10b981; color: #10b981; }
    .success-screen { display: none; text-align: center; }
    .success-screen .icon { font-size: 48px; margin-bottom: 16px; }
    .success-screen h2 { color: #10b981; margin-bottom: 8px; }
    .success-screen p { color: #a0aec0; font-size: 14px; margin-bottom: 24px; }
    .btn-login {
      display: inline-block;
      padding: 12px 32px;
      background: #3b82f6;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
    }
    .loading { text-align: center; color: #a0aec0; font-size: 14px; }
    #formArea { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>ТехноТрейд ERP</span></div>
    <div class="subtitle">Система управления предприятием</div>

    <div id="loadingArea" class="loading">Проверяем ссылку...</div>

    <div id="invalidArea" style="display:none; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">⛔</div>
      <h2 style="color:#ef4444; margin-bottom:8px;">Ссылка недействительна</h2>
      <p style="color:#a0aec0; font-size:14px;">Эта ссылка уже была использована или истекла.<br>Обратитесь к администратору.</p>
    </div>

    <div id="formArea">
      <div id="userInfo" class="user-info">
        <div class="label">Аккаунт</div>
        <div class="value" id="userName">—</div>
        <div style="color:#a0aec0; font-size:12px; margin-top:2px;" id="userEmail">—</div>
      </div>

      <div id="alertBox" class="alert"></div>

      <label>Новый пароль</label>
      <input type="password" id="password" placeholder="Минимум 6 символов" autocomplete="new-password">

      <label>Повторите пароль</label>
      <input type="password" id="password2" placeholder="Повторите пароль">
      <div class="hint">Минимум 6 символов</div>

      <button class="btn-submit" id="submitBtn">Установить пароль</button>
    </div>

    <div class="success-screen" id="successScreen">
      <div class="icon">✅</div>
      <h2>Пароль установлен!</h2>
      <p>Теперь вы можете войти в систему с вашим новым паролем.</p>
      <a href="/login" class="btn-login">Войти в систему</a>
    </div>
  </div>

  <script src="/assets/js/set-password.js"></script>
</body>
</html>
